version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sefdp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sefdp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sefdp_dev}
      POSTGRES_DB: ${POSTGRES_DB:-sefdp_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sefdp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sefdp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sefdp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-sefdp_dev}
    volumes:
      - redis_data:/data
    networks:
      - sefdp-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sefdp_dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: sefdp-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sefdp_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-sefdp_minio_secret}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - sefdp-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  sefdp-network:
    driver: bridge
